<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direcht</title>
  <style>
    :root {
      --accent-rgb: 191, 97, 106;
      --accent: rgb(var(--accent-rgb));
      --accent-chat: rgb(22, 33, 62);
      --accent-dark: #0f3460;
      --accent-soft-10: rgba(var(--accent-rgb), 0.1);
      --accent-soft-20: rgba(var(--accent-rgb), 0.2);
      --accent-soft-30: rgba(var(--accent-rgb), 0.3);
      --accent-soft-35: rgba(var(--accent-rgb), 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2px; }
    h1 { margin-bottom: 8px; color: var(--accent); font-size: 2.2rem; }
    .subtitle { color: #aaa; margin-bottom: 20px; font-size: 0.95em; }
    .container { width: 100%;}
    .card { background: rgba(22, 33, 62, 0.8); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--accent-soft-20); position: relative; }
    .card h2 { font-size: 0.7rem; color: #000; background: linear-gradient(135deg, var(--accent), #f5a623); display: inline-block; padding: 4px 10px; border-radius: 6px; position: absolute; top: -8px; right: 20px; margin-bottom: 0; font-weight: 600; }
    label { display: block; margin-bottom: 6px; font-size: 0.85em; color: #aaa; font-weight: 500; }
    input, button { font-size: 0.95rem; padding: 10px 12px; border-radius: 6px; border: 1px solid #0f3460; outline: none; transition: all 0.3s; }
    input { width: 100%; background: #0f3460; color: #eee; margin-bottom: 10px; }
    .peerId-display { font-family: monospace; }
    input:focus { border-color: var(--accent); background: #1a2450; }
    button { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #ffffff; border: none; cursor: pointer; font-weight: 600; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5); text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7); }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 16px var(--accent-soft-30); }
    button:active { transform: translateY(0); }
    button:disabled { background: #444; cursor: not-allowed; transform: none; }
    .btn-secondary { background: linear-gradient(135deg, #555, #333); }
    .btn-secondary:hover { box-shadow: 0 8px 16px rgba(85, 85, 85, 0.3); }
    .btn-danger { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); }
    .id-display { font-family: monospace; font-size: 1.4rem; color: #53d769; word-break: break-all; user-select: all; cursor: pointer; padding: 12px; background: #0a1f3e; border-radius: 6px; border: 1px solid #0f3460; transition: all 0.3s; }
    .id-display:hover { border-color: #53d769; background: #0f2f4e; }
    .status { font-size: 0.8em; margin-top: 6px; display: inline-block; padding: 4px 8px; border-radius: 4px; }
    .status.connected { color: #53d769; background: rgba(83, 215, 105, 0.25); }
    .status.disconnected { color: var(--accent); background: var(--accent-soft-10); }
    .status.waiting { color: #f5a623; background: rgba(245, 166, 35, 0.1); }
    #chatArea { display: none; }
    #messages { height: 350px; overflow-y: auto; background: rgba(15, 52, 96, 0.5); border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--accent-soft-10); }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    .msg { margin-bottom: 8px; padding: 10px 12px; border-radius: 8px; max-width: 75%; word-wrap: break-word; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg.sent { background: linear-gradient(135deg, var(--accent-chat), var(--accent-dark)); margin-left: auto; text-align: right; }
    .msg.received { background: rgba(22, 33, 62, 0.8); border: 1px solid var(--accent-soft-20); }
    .msg .meta { font-size: 0.7em; color: #999; margin-top: 4px; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; margin-bottom: 0; }
    .row.stacked { flex-direction: column; }
    .row.stacked > * { width: 100%; }
    .progress { height: 4px; background: rgba(15, 52, 96, 0.5); border-radius: 2px; margin-top: 4px; overflow: hidden; display: none; border: 1px solid var(--accent-soft-20); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #f5a623); transition: width 0.3s; }
    #typingIndicator { animation: typingPulse 1.4s infinite; }
    @keyframes typingPulse { 0%, 60%, 100% { opacity: 0.5; } 30% { opacity: 1; } }
    .chat-input-container { display: flex; gap: 8px; align-items: flex-end; padding: 12px; background: rgba(15, 52, 96, 0.5); border-radius: 8px; border: 1px solid var(--accent-soft-10); }
    .chat-input-container input { margin-bottom: 0; flex: 1; padding: 14px 12px; }
    .icon-btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #fff; border: none; padding: 14px 14px; border-radius: 6px; cursor: pointer; font-size: 1.1em; transition: all 0.3s; font-weight: 600; min-width: 48px; }
    .icon-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px var(--accent-soft-30); }
    .icon-btn:active { transform: translateY(0); }
    #toggleConnBtn { flex: 0; }
  </style>
</head>
<body>
  <h1>Direcht</h1>
  <p class="subtitle">🔐 Browser-to-browser via WebRTC — v1.2.0</p>

  <div class="container">
    <!-- Identity -->
    <div class="card">
      <h2>1. Your Identity</h2>
      <label for="usernameInput">Your name:</label>
      <div class="row">
        <input type="text" id="usernameInput" placeholder="Enter your name" onchange="saveUsername()" onkeydown="if(event.key==='Enter') saveUsername()">
      </div>
      <label for="myId" style="margin-top: 12px;">Your Peer ID (share this):</label>
      <p id="myIdLoading" style="color: #f5a623;">Connecting to signaling...</p>
      <input type="text" id="myId" class="id-display" style="display:none" color: #53d769; title="Click to copy" readonly>
      <div id="qrcodeContainer" style="display:none; margin-top:14px; text-align:center;">
        <div id="qrcode" style="display:inline-block; padding:10px; background:#0a1f3e; border-radius:8px; border:1px solid rgba(83,215,105,0.3);"></div>
      </div>
    </div>

    <!-- Connect -->
    <div class="card">
      <h2>2. Connect to Peer</h2>
      <label for="peerId">Enter the other person's Peer ID:</label>
      <div class="row">
        <input type="text" id="peerId" class="peerId-display" placeholder="Paste peer ID here" onkeydown="if(event.key==='Enter') toggleConnection()">
        <button id="scanQRBtn" class="btn-secondary" onclick="openQRScanner()" title="Scan QR code to fill Peer ID">📷 Scan</button>
        <button id="toggleConnBtn" onclick="toggleConnection()">Connect</button>
      </div>
      <p id="connStatus" class="status disconnected"></p>
    </div>

    <!-- Chat -->
    <div class="card" id="chatArea">
      <h2>3. Chat</h2>
      <div id="messages"></div>
      <div id="typingIndicator" style="display:none; font-size:0.85em; color:#aaa; font-style:italic; padding:8px 12px;">✏️ <span id="typingName">Peer</span> is typing...</div>
      <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="chat-input-container">
        <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" oninput="onMessageInput()" onblur="onMessageInputBlur()">
        <button class="icon-btn" onclick="sendMessage()" title="Send message">✉️</button>
        <input type="file" id="fileInput" style="display:none;" onchange="sendFile()">
        <button class="icon-btn" id="fileBtn" onclick="document.getElementById('fileInput').click()" title="Send a file">📎</button>
        <button class="icon-btn" onclick="clearChatHistoryConfirm()" title="Clear chat history">🗑️</button>
      </div>
    </div>
  </div>

  <!-- QR Scanner Modal -->
  <div id="qrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#16213e; border-radius:12px; padding:24px; max-width:380px; width:90%; text-align:center; border:1px solid var(--accent-soft-35);">
      <h3 style="color:var(--accent); margin-bottom:8px;">Scan Peer QR Code</h3>
      <p style="color:#aaa; font-size:0.85em; margin-bottom:14px;">Point your camera at the other person's QR code</p>
      <div id="qr-reader" style="width:100%; border-radius:8px; overflow:hidden;"></div>
      <button onclick="closeQRScanner()" style="margin-top:16px; width:100%;" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
